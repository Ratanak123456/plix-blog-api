server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: blog
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
