spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:${DATABASE_URL:}}
    username: ${DB_USERNAME:${DATABASE_USERNAME:${PGUSER:}}}
    password: ${DB_PASSWORD:${DATABASE_PASSWORD:${PGPASSWORD:}}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  threads:
    virtual:
      enabled: true
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:false}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:1800000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  mail:
    from: ${MAIL_FROM:no-reply@example.com}

management:
  health:
    mail:
      enabled: false
